career-profile:
  title: Career Profile
  summary: |
      Controls engineer with 13 years across O&G process facilities, warehouse robotics, and OEM machine building. I've commissioned large DeltaV and Rockwell systems on O&G assets, built Beckhoff-based ASRS platforms from design through customer deployment, and spent the last two years modernizing 30-year-old research equipment that contractors kept giving up on.
      
      I write more code than most controls engineers — Python, C#, PowerShell, VBA — and I maintain TwinCAT Libre, an open source library project for Beckhoff TwinCAT 3. I'm interested in the overlap between traditional industrial automation and modern software practices: Docker, IIoT architectures, OT security.
      
      Currently based in Calgary. Looking for complex project work, or comissioning and startup contracts, ideally international. 

