career-profile:
  title: Career Profile
  summary: |
      13 years commissioning and supporting industrial control systems — DCS, PLC, SCADA, OT networks — across oil and gas, chemical research, warehouse robotics, and packaging machinery.

      A lot of what I do is integration work: getting vendor skids and mechanical equipment — compressors, refrigeration, cooling loops, packaged plants — to talk to the main control system and behave the way they're supposed to. At Propak I sat on both sides of that, building our own modular PLC packages and also pulling third-party skids into the site DCS/SCADA, so I have a decent sense of where vendors cut corners and what to nail down during the FAT before anything shows up on site.

      Most of my project work is on live plants that can't afford to stop — commissioning, upgrades, and tracking down the intermittent failures nobody else can pin down. Platforms I use regularly: Rockwell, DeltaV, Beckhoff TwinCAT, Siemens, Ignition.

      Outside of work: Docker, web development, 3D printing, and whatever rabbit hole I'm currently in.

      Based in Calgary. Open to international project work and consulting engagements.
